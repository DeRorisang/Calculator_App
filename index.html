<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <table border="1">
        <tr>
            <td colspan="4">
                <input type="text" id="inputBox" value="0" readonly>
            </td>
        </tr>
        <tr>
            <td onclick="digitBtnPressed(7)" class="numbers">7</td>
            <td onclick="digitBtnPressed(8)" class="numbers">8</td>
            <td onclick="digitBtnPressed(9)" class="numbers">9</td>
            <td onclick="operatorBtnPressed('x')" class="operators">x</td>
        </tr>
        <tr>
            <td onclick="digitBtnPressed(4)" class="numbers">4</td>
            <td onclick="digitBtnPressed(5)" class="numbers">5</td>
            <td onclick="digitBtnPressed(6)" class="numbers">6</td>
            <td onclick="operatorBtnPressed('-')" class="operators">-</td>
        </tr>
        <tr>
            <td onclick="digitBtnPressed(1)" class="numbers">1</td>
            <td onclick="digitBtnPressed(2)" class="numbers">2</td>
            <td onclick="digitBtnPressed(3)" class="numbers">3</td>
            <td onclick="operatorBtnPressed('+')" class="operators">+</td>
        </tr>
        <tr>
            <td onclick="digitBtnPressed(0)" colspan="2" class="numbers">0</td>
            <td onclick="btnACPressed()" class="AC">AC</td>
            <td onclick="operatorBtnPressed('/')" class="operators">/</td>
        </tr>
        <tr>
            <td onclick="equalToBtnPressed()" colspan="4" class="operators">=</td>
        </tr>
    </table>

    <script>
        var currentNumber = "0"; // the number currently being typed
        var value1 = null;       // first operand, stored once an operator is pressed
        var currentOperator = null;
        var newNumber = true;    // true = next digit starts a fresh number

        function updateDisplay() {
            var display;
            if (currentOperator !== null) {
                display = value1 + " " + currentOperator + (newNumber ? "" : " " + currentNumber);
            } else {
                display = currentNumber;
            }
            document.getElementById("inputBox").value = display;
        }

        //Event handler for when a digit button is pressed
        function digitBtnPressed(button) {
            if (newNumber) {
                currentNumber = String(button);
                newNumber = false;
            } else {
                currentNumber += button;
            }
            updateDisplay();
        }

        //Event handler for when the AC button is pressed
        function btnACPressed() {
            currentNumber = "0";
            value1 = null;
            currentOperator = null;
            newNumber = true;
            updateDisplay();
        }

        //Event handler for when an operator button is pressed
        function operatorBtnPressed(operator) {
            value1 = parseFloat(currentNumber);
            currentOperator = operator;
            newNumber = true;
            updateDisplay();
        }

        //Event handler for when the equal button is pressed
        function equalToBtnPressed() {
            if (currentOperator === null) return;

            var value2 = parseFloat(currentNumber);
            var totalValue;

            switch (currentOperator) {
                case "+": totalValue = value1 + value2;
                    break;
                case "-": totalValue = value1 - value2;
                    break;
                case "x": totalValue = value1 * value2;
                    break;
                case "/": totalValue = value1 / value2;
                    break;
            }

            currentNumber = String(totalValue);
            value1 = null;
            currentOperator = null;
            newNumber = true;
            updateDisplay();
        }
    </script>
</body>

</html>
